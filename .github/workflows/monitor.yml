name: OP Regional Monitor

on:
  schedule:
    # Ogni 6 ore. Modifica come preferisci (formato cron UTC).
    - cron: '0 */6 * * *'
  workflow_dispatch:  # Permette esecuzione manuale dal pulsante Actions

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Serve per committare known_events.json aggiornato
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python op_monitor.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add known_events.json || true
          git diff --cached --quiet || git commit -m "Update known events"
          git push || true
