name: OP Regional Monitor

on:
  schedule:
    # Ogni 3 ore (orari UTC: 00, 03, 06, 09, 12, 15, 18, 21).
    # In ora italiana CET = UTC+1: 01, 04, 07, 10, 13, 16, 19, 22.
    # In ora italiana CEST = UTC+2: 02, 05, 08, 11, 14, 17, 20, 23.
    - cron: '0 */3 * * *'
  workflow_dispatch:  # Permette esecuzione manuale dal pulsante Actions

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Serve per committare known_events.json e summary_message.json
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python op_monitor.py

      - name: Debug - lista file dopo lo script
        run: |
          echo "=== File presenti nella working directory ==="
          ls -la
          echo "=== Contenuto summary_message.json (se esiste) ==="
          cat summary_message.json 2>/dev/null || echo "FILE NON ESISTE"
          echo "=== Contenuto .gitignore (se esiste) ==="
          cat .gitignore 2>/dev/null || echo "Nessun .gitignore"
          echo "=== git status ==="
          git status

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Aggiungiamo i file uno per uno, ignorando errori solo se il file non esiste
          [ -f known_events.json ] && git add -f known_events.json
          [ -f summary_message.json ] && git add -f summary_message.json
          git diff --cached --quiet || git commit -m "Update monitor state"
          git push
